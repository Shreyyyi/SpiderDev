<!DOCTYPE html>
<html>
<head>
    <title>Zomato Restaurant</title>
</head>
<body>

    <h1><i>zomato</i></h1>

    <img src="rest.webp"alt="Restaurant Image">

    <h2>Menu</h2>

    <table border="1">
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>Margherita Pizza</td>
            <td>₹250</td>
        </tr>

        <tr>
            <td>Burger</td>
            <td>₹150</td>
        </tr>

        <tr>
            <td>Cold Drink</td>
            <td>₹50</td>
        </tr>
    </table>

    <h2>Customer Reviews</h2>

    <ul>
        <li>Great food and quick service.</li>
        <li>Affordable prices.</li>
        <li>Loved the pizza.</li>
    </ul>

    <h2>Place Order</h2>

    <form>
        Name: <input type="text" placeholder="Enter Name"><br><br>

        Food Item:
        <input type="text" placeholder="Enter Item eg. Pizza"><br><br>

        Quantity:
        <input type="number" placeholder="Enter the quantity eg. 2"><br><br>

        <input type="submit" value="Order Now">
    </form>

</body>
</html>
